<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Moonlight</title>
    <style>
        :root { --accent: #ff758c; --glass: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* 背景 Canvas */
        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        #app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white; transition: all 0.8s ease; }
        
        /* 毛玻璃容器 */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.2);
            padding: 40px; border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 350px; width: 85%;
        }

        /* 拍立得特效 */
        .polaroid { 
            background: white; padding: 12px 12px 45px 12px; 
            transform: rotate(-3deg); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }
        .polaroid img { width: 100%; height: 260px; object-fit: cover; display: block; }
        
        /* 霓虹燈蛋糕 */
        .cake-glow {
            width: 120px; height: 100px; background: #ff758c;
            border-radius: 15px 15px 5px 5px; margin: 50px auto;
            position: relative; box-shadow: 0 0 30px #ff758c;
            cursor: pointer;
        }
        .cake-glow::before {
            content: ''; position: absolute; top: 30px; left: -5px; width: 130px; height: 15px;
            background: #ffecf0; border-radius: 20px;
        }
        .candle-neon {
            width: 8px; height: 40px; background: #fff; position: absolute;
            top: -40px; left: 56px; border-radius: 4px; box-shadow: 0 0 10px #fff;
        }
        .flame-neon {
            width: 14px; height: 22px; background: #ffdf00; border-radius: 50% 50% 20% 20%;
            position: absolute; top: -25px; left: -3px;
            box-shadow: 0 0 20px #ffdf00, 0 0 40px #ff758c;
            animation: flicker 0.2s infinite alternate;
        }
        @keyframes flicker { to { opacity: 0.8; transform: scale(1.1); } }

        /* 按鈕與文字 */
        button {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            border: none; padding: 15px 40px; color: white; border-radius: 50px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,117,140,0.3); transition: 0.3s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,117,140,0.5); }
        .hidden { display: none !important; }
        .timer { font-size: 1.1rem; color: #ffd700; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<audio id="music" loop>
    <source src="你的音樂網址" type="audio/mpeg">
</audio>

<div id="app">
    <!-- Step 1 -->
    <div id="p1" class="glass-card">
        <h2 style="font-weight: 300; letter-spacing: 3px;">Tonight</h2>
        <p style="opacity: 0.8;">跨越距離，為你摘下星空</p>
        <button onclick="start()">開啟驚喜</button>
    </div>

    <!-- Step 2 -->
    <div id="p2" class="hidden">
        <div class="polaroid">
            <img id="roll" src="你的照片1">
        </div>
        <button onclick="go3()">點燃心願</button>
    </div>

    <!-- Step 3 -->
    <div id="p3" class="hidden">
        <p>這是我為你準備的蛋糕</p>
        <div class="cake-glow" onclick="go4()">
            <div class="candle-neon"><div class="flame-neon" id="fire"></div></div>
        </div>
        <p style="font-size: 0.8rem; opacity: 0.6;">(點擊火苗吹熄它)</p>
    </div>

    <!-- Step 4 -->
    <div id="p4" class="hidden glass-card">
        <p>願望一定會實現</p>
        <div class="timer" id="cd"></div>
        <p style="margin-top: 20px;">7月9日，見面那天抱緊你 ❤️</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    // --- Canvas 流星背景系統 ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    class Star {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2;
            this.speed = Math.random() * 0.5;
        }
        draw() {
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
        update() {
            this.y += this.speed;
            if (this.y > canvas.height) this.y = 0;
        }
    }

    for(let i=0; i<150; i++) stars.push(new Star());

    function anim() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        stars.forEach(s => { s.update(); s.draw(); });
        requestAnimationFrame(anim);
    }
    anim();

    // --- 邏輯控制 ---
    const m = document.getElementById('music');
    const pics = ["你的照片1", "你的照片2"]; // 換成你的網址

    function start() {
        m.play().catch(()=>{});
        show('p1', 'p2');
        let i = 0;
        setInterval(() => {
            i = (i+1)%pics.length;
            document.getElementById('roll').src = pics[i];
        }, 3000);
    }

    function go3() { show('p2', 'p3'); }

    function go4() {
        document.getElementById('fire').style.display = 'none';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff758c', '#ffffff'] });
        setTimeout(() => { show('p3', 'p4'); startCD(); }, 1200);
    }

    function show(oldId, newId) {
        document.getElementById(oldId).classList.add('hidden');
        document.getElementById(newId).classList.remove('hidden');
    }

    function startCD() {
        const target = new Date("July 9, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = target - now;
            const days = Math.floor(d / (1000 * 60 * 60 * 24));
            const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((d % (1000 * 60)) / 1000);
            document.getElementById('cd').innerText = `${days}D ${hours}H ${mins}M ${secs}S`;
        }, 1000);
    }
</script>
</body>
</html>
