<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>給最愛的男友 · 星空煙花生日派對</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0f2a, #030518);
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans TC', system-ui, sans-serif;
            color: #fffdf7;
        }

        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: none;
        }

        /* 煙花畫布 */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 15;
            pointer-events: none;
        }

        #app {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .polaroid {
            background: #fef9e8;
            padding: 12px 12px 25px 12px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4);
            transform: rotate(-1.5deg);
            width: 280px;
            margin: 20px auto;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .polaroid img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            border-radius: 8px;
            background: #f0e6d2;
        }
        .polaroid-text {
            color: #3a2c1f;
            margin-top: 12px;
            font-weight: 600;
            font-size: 1rem;
            min-height: 50px;
            padding: 0 6px;
        }

        .cake {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 20px auto;
            cursor: pointer;
        }
        .cake-bottom {
            position: absolute;
            bottom: 0;
            width: 170px;
            height: 65px;
            background: linear-gradient(145deg, #f7c68e, #e0a56b);
            border-radius: 18px;
            box-shadow: 0 8px 0 #a5662a;
        }
        .cake-top {
            position: absolute;
            top: 85px;
            width: 170px;
            height: 28px;
            background: linear-gradient(120deg, #ff9ebb, #ff6b92);
            border-radius: 30px;
        }
        .candle {
            position: absolute;
            top: 38px;
            left: 80px;
            width: 12px;
            height: 48px;
            background: linear-gradient(90deg, #f9f1e2, #fff9f0);
            border-radius: 4px;
        }
        .flame {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 24px;
            background: #ff7e33;
            border-radius: 60% 40% 50% 50%;
            box-shadow: 0 0 18px #ffa500;
            animation: flicker 0.18s infinite alternate;
            cursor: pointer;
        }
        .flame-out {
            opacity: 0;
            transform: translateX(-50%) scale(0);
            transition: opacity 0.2s, transform 0.2s;
            animation: none;
            box-shadow: none;
        }
        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); background: #ff8c42; }
            100% { transform: translateX(-50%) scale(1.18); background: #ff4500; }
        }
        
        .timer {
            font-size: 1.2rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 10px 18px;
            border-radius: 60px;
            display: inline-block;
            margin-top: 15px;
            color: #ffec9f;
            font-weight: 500;
        }
        
        button {
            padding: 14px 32px;
            background: linear-gradient(95deg, #ff9a9e, #fecf8a);
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d1b0c;
            cursor: pointer;
            box-shadow: 0 6px 0 #b1624b;
            margin-top: 20px;
            transition: transform 0.07s, box-shadow 0.07s;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b1624b;
        }
        .hidden {
            display: none !important;
        }
        
        h1 {
            font-size: 2.4rem;
            text-shadow: 0 0 8px #ffb6c1;
        }
        .instruction {
            font-size: 0.85rem;
            background: rgba(255,255,200,0.2);
            display: inline-block;
            padding: 6px 12px;
            border-radius: 60px;
            margin-top: 8px;
        }
        
        .reveal-btn {
            animation: fadeInUp 0.5s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        @media (max-width: 500px) {
            .polaroid { width: 250px; }
            .polaroid img { height: 240px; }
            .cake { width: 150px; height: 150px; }
            .cake-bottom { width: 150px; height: 58px; }
            .cake-top { width: 150px; top: 73px; }
            .candle { left: 69px; top: 28px; }
            .timer { font-size: 0.9rem; }
            .polaroid-text { font-size: 0.85rem; }
        }
        
        section {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<canvas id="fireworksCanvas"></canvas>

<div id="app">
    <section id="step1">
        <h1>✨ 寶貝 生日快樂 ✨</h1>
        <p style="font-size: 1.2rem; margin: 12px 0;">你是我宇宙中最亮的星</p>
        <div style="margin: 15px 0;">🌟 💫 ⭐</div>
        <button id="startBtn">👉 點我進入星空驚喜 👈</button>
        <div class="instruction">(記得開聲音喔🌸)</div>
    </section>

    <section id="step2" class="hidden">
        <div class="polaroid" style="transform: rotate(-2deg);">
            <img id="pic" src="https://i.ibb.co/4RBqhdkK/IMG-8809.jpg" alt="我們的回憶">
            <div class="polaroid-text" id="picCaption"> Happy Birthday to my babe 💖</div>
        </div>
        <p id="photoCounter" style="margin-top: 8px; font-size: 0.9rem; opacity: 0.8;"></p>
        <button id="goToCakeBtn" class="hidden" style="background:#ff9a9e;">🎂 看驚喜 🎂</button>
    </section>

    <section id="step3" class="hidden">
        <p style="font-size: 1.3rem; font-weight: bold;">🎵 許個願望，吹熄蠟燭吧 🎵</p>
        <div class="cake-wrapper">
            <div class="cake" id="cakeClickArea">
                <div class="candle">
                    <div class="flame" id="candleFlame"></div>
                </div>
                <div class="cake-bottom"></div>
                <div class="cake-top"></div>
            </div>
        </div>
        <div class="instruction">✨ 輕點「火焰」或整個蛋糕吹熄它 ✨</div>
        <button id="forceBlowBtn" style="background:#ffb347; margin-top: 25px;">💨 吹蠟燭！ 💨</button>
    </section>

    <section id="step4" class="hidden">
        <div class="polaroid" style="transform: rotate(3deg);">
            <img id="lastImg" src="https://i.ibb.co/4RBqhdkK/IMG-8809.jpg" alt="約定見面">
            <div class="polaroid-text">❤️ 愛你愛你 ❤️</div>
        </div>
        <div id="cd" class="timer">計算甜蜜倒數中...</div>
        <p style="margin-top: 12px;">💌 我最愛的寶貝，生日快樂 💌</p>
        <button id="playMusicAgain" style="background:#6a4e9b; margin-top: 20px;">🎵 重播音樂 🎵</button>
    </section>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://mp3tourl.com/audio/1777741036879-550da38b-c8a2-423b-8a33-d8f9245a79e6.mp3" type="audio/mpeg">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<script>
    // ========== 1. 星星系統 ==========
    const canvas = document.getElementById('starCanvas');
    let ctx = canvas.getContext('2d');
    let starsArray = [];
    let shootingStars = [];
    let starCount = 280;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
    }
    
    function initStars() {
        starsArray = [];
        for (let i = 0; i < starCount; i++) {
            starsArray.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2.5 + 1,
                alpha: Math.random() * 0.6 + 0.3,
                blinkSpeed: Math.random() * 0.03 + 0.008
            });
        }
    }
    
    function drawStars() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#03051a');
        grad.addColorStop(1, '#0b102f');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        for (let s of starsArray) {
            let alphaVal = s.alpha + Math.sin(Date.now() * s.blinkSpeed) * 0.22;
            alphaVal = Math.min(0.96, Math.max(0.25, alphaVal));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 240, 200, ${alphaVal})`;
            ctx.fill();
            if (s.radius > 2.2) {
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(255,215,0,0.4)';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        for (let i = 0; i < shootingStars.length; i++) {
            const star = shootingStars[i];
            ctx.beginPath();
            ctx.moveTo(star.x, star.y);
            ctx.lineTo(star.x + star.speedX * 1.4, star.y + star.speedY * 1.4);
            ctx.lineWidth = 2.2;
            ctx.strokeStyle = `rgba(255, 220, 150, ${star.alpha})`;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(star.x, star.y, 2.2, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 200, 100, ${star.alpha})`;
            ctx.fill();
            star.x += star.speedX;
            star.y += star.speedY;
            star.alpha -= 0.018;
            if (star.x + 60 < 0 || star.x - 60 > canvas.width || star.y > canvas.height + 40 || star.alpha <= 0) {
                shootingStars.splice(i,1);
                i--;
            }
        }
    }
    
    function addShootingStar() {
        if (Math.random() < 0.12) {
            shootingStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.3,
                speedX: -4 - Math.random() * 9,
                speedY: 2 + Math.random() * 6,
                alpha: 0.85
            });
        }
        if (shootingStars.length > 12) shootingStars.shift();
    }
    
    function animateStars() {
        drawStars();
        addShootingStar();
        requestAnimationFrame(animateStars);
    }
    
    window.addEventListener('resize', () => resizeCanvas());
    
    // ========== 2. 煙花系統 (最後一頁綻放) ==========
    const fireworksCanvas = document.getElementById('fireworksCanvas');
    let fwCtx = fireworksCanvas.getContext('2d');
    let particles = [];
    let fireworksActive = false;
    let animationId = null;
    
    function resizeFireworks() {
        fireworksCanvas.width = window.innerWidth;
        fireworksCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => resizeFireworks());
    
    class FireParticle {
        constructor(x, y, vx, vy, color, size, gravity = 0.2) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.color = color;
            this.size = size;
            this.gravity = gravity;
            this.alpha = 1;
            this.decay = 0.02 + Math.random() * 0.02;
        }
        update() {
            this.vx *= 0.98;
            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= this.decay;
            return this.alpha > 0;
        }
        draw() {
            fwCtx.save();
            fwCtx.globalAlpha = this.alpha;
            fwCtx.beginPath();
            fwCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            fwCtx.fillStyle = this.color;
            fwCtx.fill();
            fwCtx.restore();
        }
    }
    
    function createFirework(x, y) {
        const colors = ['#ff0040', '#ff8000', '#ffff00', '#00ff80', '#00bfff', '#ff00ff', '#ff69b4', '#ffd700'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        const particleCount = 70 + Math.floor(Math.random() * 40);
        for (let i = 0; i < particleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 6;
            const vx = Math.cos(angle) * speed * (Math.random() * 1.2);
            const vy = Math.sin(angle) * speed * (Math.random() * 1.2);
            const size = 2 + Math.random() * 3;
            particles.push(new FireParticle(x, y, vx, vy, color, size, 0.15));
        }
    }
    
    function randomFirework() {
        if (!fireworksActive) return;
        const x = Math.random() * fireworksCanvas.width;
        const y = Math.random() * fireworksCanvas.height * 0.7 + 50;
        createFirework(x, y);
        setTimeout(() => {
            if (fireworksActive) randomFirework();
        }, 400 + Math.random() * 500);
    }
    
    function updateFireworks() {
        if (!fwCtx || !fireworksActive) return;
        fwCtx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
        for (let i = particles.length-1; i >= 0; i--) {
            const alive = particles[i].update();
            particles[i].draw();
            if (!alive) particles.splice(i,1);
        }
        if (fireworksActive) {
            animationId = requestAnimationFrame(updateFireworks);
        }
    }
    
    function startFireworks() {
        if (fireworksActive) return;
        fireworksActive = true;
        resizeFireworks();
        particles = [];
        if (animationId) cancelAnimationFrame(animationId);
        updateFireworks();
        for (let i = 0; i < 6; i++) {
            setTimeout(() => {
                if (fireworksActive) {
                    const x = Math.random() * fireworksCanvas.width;
                    const y = Math.random() * fireworksCanvas.height * 0.6 + 80;
                    createFirework(x, y);
                }
            }, i * 180);
        }
        randomFirework();
    }
    
    function stopFireworks() {
        fireworksActive = false;
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        if (fwCtx) fwCtx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
        particles = [];
    }
    
    // ========== 3. 核心互動 (八張照片+每張不同敘述) ==========
    let photoInterval = null;
    let audio = document.getElementById('bgMusic');
    let countdownInterval = null;
    let blown = false;
    
    // 8張照片 (擴充)
    const photosArray = [
        "https://i.ibb.co/4RBqhdkK/IMG-8809.jpg",
        "https://i.ibb.co/7JXKt9sH/IMG-8685.jpg",
        "https://i.ibb.co/1G8yLZv4/C8-EA2504-C469-42-B5-ACB3-4948693-E7-AAA.jpg",
        "https://i.ibb.co/k6XY24c5/IMG-9091.jpg",
        "https://i.ibb.co/V69LyWD/IMG-8934.jpg",
        "https://i.ibb.co/wh2pdBX1/IMG-1542.jpg",
        "https://i.ibb.co/FkpPtQhJ/IMG-7549.png",
        "https://i.ibb.co/B2LKTfNM/IMG-8581.jpg"
    ];
    
    // 每張照片的專屬敘述 (八個不同)
    const captions = [
        "💖 謝謝你出現在我生命裏 💖",
        "🌸 傻傻地好喜歡 🌸",
        "🍰 有人偷偷哭抓到 🍰",
        "✨ Judy & Nick! ✨",
        "💫 好醜啊哈哈哈哈 💫",
        "🎈 和你在一起的每天都甜蜜 🎈",
        "🌟 害羞了嘻嘻 🌟",
        "❤️ 寶貝生日快樂，我的世界因你完整 ❤️"
    ];
    
    const lastPhoto = "https://i.ibb.co/4RBqhdkK/IMG-8809.jpg";
    
    let currentPicIndex = 0;
    let hasCycledOnce = false;
    let totalPhotos = photosArray.length;
    
    function playBackgroundMusic() {
        if (audio) {
            audio.volume = 0.45;
            audio.play().catch(e => console.log("等待用戶互動"));
        }
    }
    
    function toStep2() {
        document.getElementById('step1').classList.add('hidden');
        const step2Div = document.getElementById('step2');
        step2Div.classList.remove('hidden');
        
        if (photoInterval) clearInterval(photoInterval);
        currentPicIndex = 0;
        hasCycledOnce = false;
        const picElement = document.getElementById('pic');
        const captionEl = document.getElementById('picCaption');
        const goBtn = document.getElementById('goToCakeBtn');
        const counterEl = document.getElementById('photoCounter');
        
        goBtn.classList.add('hidden');
        counterEl.innerText = `📸 回憶旅程GOGOGO ${currentPicIndex+1} / ${totalPhotos}`;
        picElement.src = photosArray[0];
        captionEl.innerText = captions[0];
        
        photoInterval = setInterval(() => {
            let nextIndex = (currentPicIndex + 1) % totalPhotos;
            currentPicIndex = nextIndex;
            picElement.src = photosArray[currentPicIndex];
            captionEl.innerText = captions[currentPicIndex];
            counterEl.innerText = `📸 最愛你了 ${currentPicIndex+1} / ${totalPhotos}`;
            
            if (currentPicIndex === 0 && !hasCycledOnce) {
                hasCycledOnce = true;
                if (photoInterval) clearInterval(photoInterval);
                photoInterval = null;
                counterEl.innerText = `✨ 滿滿回憶 ✨ 共 ${totalPhotos} 張珍貴瞬間`;
                goBtn.classList.remove('hidden');
                goBtn.classList.add('reveal-btn');
            }
        }, 2800);
    }
    
    function toStep3() {
        if (photoInterval) clearInterval(photoInterval);
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        blown = false;
        const flame = document.getElementById('candleFlame');
        if (flame) {
            flame.classList.remove('flame-out');
            flame.style.animation = 'flicker 0.18s infinite alternate';
            flame.style.opacity = '1';
            flame.style.transform = 'translateX(-50%) scale(1)';
        }
    }
    
    function blowCandle() {
        if (blown) return;
        const flame = document.getElementById('candleFlame');
        if (!flame) return;
        flame.classList.add('flame-out');
        flame.style.animation = 'none';
        flame.style.boxShadow = 'none';
        blown = true;
        const cakeDiv = document.querySelector('.cake');
        if (cakeDiv) {
            cakeDiv.style.transform = 'scale(0.97)';
            setTimeout(() => { if(cakeDiv) cakeDiv.style.transform = ''; }, 130);
        }
        setTimeout(() => { toStep4(); }, 380);
    }
    
    function toStep4() {
        if (countdownInterval) clearInterval(countdownInterval);
        document.getElementById('step3').classList.add('hidden');
        const step4Div = document.getElementById('step4');
        step4Div.classList.remove('hidden');
        const lastImgElem = document.getElementById('lastImg');
        if (lastImgElem) lastImgElem.src = lastPhoto;
        
        // 啟動煙花效果 ✨
        startFireworks();
        
        const targetDate = new Date("July 9, 2026 00:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) {
                document.getElementById('cd').innerHTML = "🎉 就是今天！寶貝見面啦 🎉";
                if (countdownInterval) clearInterval(countdownInterval);
                return;
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % 86400000) / 3600000);
            const minutes = Math.floor((distance % 3600000) / 60000);
            const secs = Math.floor((distance % 60000) / 1000);
            document.getElementById('cd').innerHTML = `📅 距離下次見面還有 ${days}天 ${hours}時 ${minutes}分 ${secs}秒 💖`;
        }
        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 1000);
        if (audio && audio.paused) audio.play().catch(e => console.log);
    }
    
    function bindInteractions() {
        const startBtn = document.getElementById('startBtn');
        if (startBtn) {
            startBtn.addEventListener('click', (e) => {
                e.preventDefault();
                playBackgroundMusic();
                toStep2();
            });
        }
        const goToCake = document.getElementById('goToCakeBtn');
        if (goToCake) goToCake.addEventListener('click', () => toStep3());
        const forceBtn = document.getElementById('forceBlowBtn');
        if (forceBtn) forceBtn.addEventListener('click', () => blowCandle());
        const cakeArea = document.getElementById('cakeClickArea');
        if (cakeArea) cakeArea.addEventListener('click', () => { if (!blown) blowCandle(); });
        const flameOnly = document.getElementById('candleFlame');
        if (flameOnly) {
            flameOnly.addEventListener('click', (e) => { e.stopPropagation(); if (!blown) blowCandle(); });
        }
        const replayBtn = document.getElementById('playMusicAgain');
        if (replayBtn) {
            replayBtn.addEventListener('click', () => {
                if (audio) { audio.currentTime = 0; audio.play().catch(e => console.log); }
            });
        }
    }
    
    function preloadImages() {
        photosArray.forEach(src => { const img = new Image(); img.src = src; });
        const lastImgPre = new Image(); lastImgPre.src = lastPhoto;
    }
    
    window.onload = () => {
        resizeCanvas();
        animateStars();
        resizeFireworks();
        bindInteractions();
        preloadImages();
    };
    
    window.addEventListener('beforeunload', () => {
        if (photoInterval) clearInterval(photoInterval);
        if (countdownInterval) clearInterval(countdownInterval);
        stopFireworks();
    });
</script>
</body>
</html>
