<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快樂！星空浪漫版</title>
    <style>
        /* 修復：確保星空背景完全顯示 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 防止滾動條破壞背景 */
        }
        body { 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 星星閃爍動畫修復 */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            opacity: 0.8;
        }

        #app { text-align: center; z-index: 1; width: 90%; max-width: 450px; }
        
        /* 修復：拍立得樣式，確保圖片顯示完整 */
        .polaroid-frame {
            background: white;
            padding: 15px 15px 60px 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin: 20px auto;
            transform: rotate(-2deg);
            transition: all 1s ease;
        }
        /* 修復：object-fit: cover 確保圖片不變形且填滿，height 設為自動 */
        .polaroid-frame img { 
            width: 100%; 
            height: 280px; /* 固定高度，寬度隨比例 */
            object-fit: cover; 
            display: block; 
            border: 1px solid #eee;
        }
        .polaroid-text { 
            color: #333; 
            font-size: 1.2rem; 
            margin-top: 15px; 
            font-family: 'cursive', sans-serif;
        }

        /* 蛋糕動畫 */
        .cake { font-size: 80px; cursor: pointer; position: relative; margin: 30px 0; }
        .flame { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); animation: flicker 0.5s infinite; }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* 倒數計時器修復 */
        #countdown {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .timerDisplay { font-size: 1.1rem; color: #ffeb3b; font-weight: bold; margin-top: 10px;}

        /* 通用：隱藏元素的類 */
        .hidden { display: none !important; }

        button { 
            padding: 12px 30px; 
            background: #ff7b9c; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(255,123,156,0.4);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="stars"></div>

<!-- 背景音樂：確保 loop 有加上 -->
<audio id="bgMusic" loop preload="auto">
    <source src="https://vps-2832b6fa.ytconvert.org/files/8R9AWJXsKHvkVrniH9mIt/output.mp3?token=43c25288d731ccb876a1aa7cf56290bdcf0719fbac6fb4028889d922dc47b469&expires=1777722467" type="audio/mpeg">
</audio>

<div id="app">
    <!-- 第一階段：啟動 -->
    <div id="step1">
        <h1 style="letter-spacing: 2px;">嘿，生日快樂！</h1>
        <p>明天就是你的大日子 ❤️</p>
        <p>點擊開啟屬於我們的星空</p>
        <button onclick="startExperience()">開啟回憶</button>
    </div>

    <!-- 第二階段：拍立得照片輪播 -->
    <div id="step2" class="hidden">
        <div class="polaroid-frame">
            <!-- 預設佔位圖，確保不會因為找不到圖而卡住 -->
            <img src="https://via.placeholder.com/400x280?text=Wait+Photos" id="slideshow">
            <div class="polaroid-text">我們美好的點滴</div>
        </div>
        <button onclick="showCake()">許個願吧</button>
    </div>

    <!-- 第三階段：蛋糕 -->
    <div id="step3" class="hidden">
        <h3>閉上眼，許完願後吹熄它...</h3>
        <div class="cake" onclick="blowCandle()">
            <div class="flame" id="candleFlame">🔥</div>
            🎂
        </div>
        <p>(點擊蛋糕吹熄)</p>
    </div>

    <!-- 第四階段：倒數計時與結尾 -->
    <div id="step4" class="hidden">
        <h2 style="color: #ff7b9c;">願望一定會實現！</h2>
        <div class="polaroid-frame" style="transform: rotate(2deg);">
            <img src="https://via.placeholder.com/400x280?text=Final+Moment">
            <div class="polaroid-text">下次見面，等我親口說</div>
        </div>
        
        <div id="countdown">
            <p>距離 7 月 9 日見面還有：</p>
            <div id="timerDisplay" class="timerDisplay">載入倒數中...</div>
        </div>
    </div>
</div>

<!-- 引入 Confetti (彩帶) 特效庫 -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    const music = document.getElementById('bgMusic');
    
    // 修復：請在這裡填入你的真實圖片網址
    const photoUrls = [
        "https://via.placeholder.com/400x280?text=Photo+1", 
        "https://via.placeholder.com/400x280?text=Photo+2", 
        "https://via.placeholder.com/400x280?text=Photo+3"
    ]; 
    let photoIndex = 0;
    let slideshowInterval;

    function startExperience() {
        console.log("Experience starting...");
        
        // 嘗試播放音樂
        music.play().catch(e => console.log("音樂自動播放被攔截，這沒關係：", e));
        
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        
        // 修復：先手動設定第一張圖，確保不卡住
        const imgEl = document.getElementById('slideshow');
        imgEl.src = photoUrls[0];

        // 修復：照片輪播邏輯，加上錯誤處理
        slideshowInterval = setInterval(() => {
            photoIndex = (photoIndex + 1) % photoUrls.length;
            console.log("Changing to photo:", photoIndex);
            imgEl.src = photoUrls[photoIndex];
        }, 3000);
    }

    function showCake() {
        // 清除輪播，防止背景繼續跑
        clearInterval(slideshowInterval);
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
    }

    function blowCandle() {
        document.getElementById('candleFlame').classList.add('hidden');
        
        // 灑彩帶特效 (確保特效庫有載入)
        if (typeof confetti === 'function') {
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
        }
        
        setTimeout(() => {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            startCountdown();
        }, 1500);
    }

    // 倒數計時邏輯修復
    function startCountdown() {
        const targetDate = new Date("July 9, 2026 00:00:00").getTime();
        const timerEl = document.getElementById('timerDisplay');

        // 先跑一次，避免延遲 1 秒才顯示
        updateTimer();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                timerEl.innerHTML = "我們已經見面啦 ❤️";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            timerEl.innerHTML = `${days}天 ${hours}時 ${mins}分 ${secs}秒`;
        }

        setInterval(updateTimer, 1000);
    }
</script>

</body>
</html>
