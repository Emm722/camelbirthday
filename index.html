<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>給最愛的男友 · 生日星空樂園</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0f2a, #030518);
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans TC', system-ui, sans-serif;
            color: #fffdf7;
        }

        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: none;
        }

        #app {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .polaroid {
            background: #fef9e8;
            padding: 12px 12px 35px 12px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4);
            transform: rotate(-1.5deg);
            width: 270px;
            margin: 20px auto;
            border-radius: 12px;
        }
        .polaroid img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            border-radius: 8px;
        }
        .polaroid-text {
            color: #3a2c1f;
            margin-top: 12px;
            font-weight: 600;
        }

        .cake {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 20px auto;
            cursor: pointer;
        }
        .cake-bottom {
            position: absolute;
            bottom: 0;
            width: 170px;
            height: 65px;
            background: linear-gradient(145deg, #f7c68e, #e0a56b);
            border-radius: 18px;
            box-shadow: 0 8px 0 #a5662a;
        }
        .cake-top {
            position: absolute;
            top: 85px;
            width: 170px;
            height: 28px;
            background: linear-gradient(120deg, #ff9ebb, #ff6b92);
            border-radius: 30px;
        }
        .candle {
            position: absolute;
            top: 38px;
            left: 80px;
            width: 12px;
            height: 48px;
            background: linear-gradient(90deg, #f9f1e2, #fff9f0);
            border-radius: 4px;
        }
        .flame {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 24px;
            background: #ff7e33;
            border-radius: 60% 40% 50% 50%;
            box-shadow: 0 0 18px #ffa500;
            animation: flicker 0.18s infinite alternate;
            cursor: pointer;
        }
        .flame-out {
            opacity: 0;
            transform: translateX(-50%) scale(0);
            transition: opacity 0.2s, transform 0.2s;
            animation: none;
            box-shadow: none;
        }
        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); background: #ff8c42; }
            100% { transform: translateX(-50%) scale(1.18); background: #ff4500; }
        }
        
        .timer {
            font-size: 1.3rem;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
            margin-top: 15px;
            color: #ffec9f;
        }
        
        button {
            padding: 14px 32px;
            background: linear-gradient(95deg, #ff9a9e, #fecf8a);
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d1b0c;
            cursor: pointer;
            box-shadow: 0 6px 0 #b1624b;
            margin-top: 20px;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b1624b;
        }
        .hidden {
            display: none !important;
        }
        
        h1 {
            font-size: 2.4rem;
            text-shadow: 0 0 8px #ffb6c1;
        }
        .instruction {
            font-size: 0.85rem;
            background: rgba(255,255,200,0.2);
            display: inline-block;
            padding: 6px 12px;
            border-radius: 60px;
            margin-top: 8px;
        }
        
        @media (max-width: 500px) {
            .polaroid { width: 240px; }
            .polaroid img { height: 230px; }
            .cake { width: 150px; height: 150px; }
            .cake-bottom { width: 150px; height: 58px; }
            .cake-top { width: 150px; top: 73px; }
            .candle { left: 69px; top: 28px; }
            .timer { font-size: 1rem; }
        }
        
        section {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div id="app">
    <section id="step1">
        <h1>✨ 寶貝 生日快樂 ✨</h1>
        <p style="font-size: 1.2rem; margin: 12px 0;">你是我宇宙中最亮的星</p>
        <div style="margin: 15px 0;">🌟 💫 ⭐</div>
        <button onclick="toStep2()">👉 點我進入星空驚喜 👈</button>
        <div class="instruction">(記得開音樂喔)</div>
    </section>

    <section id="step2" class="hidden">
        <div class="polaroid" style="transform: rotate(-2deg);">
            <img id="pic" src="https://i.ibb.co/4RBqhdkK/IMG-8809.jpg" alt="我們的回憶">
            <div class="polaroid-text">💖 Happy Birthday to my babe 💖</div>
        </div>
        <p style="margin-top: 5px;">🌸 可愛寶貝又大一歲了 🌸</p>
        <button onclick="toStep3()">🎂 切蛋糕看驚喜 🎂</button>
    </section>

    <section id="step3" class="hidden">
        <p style="font-size: 1.3rem; font-weight: bold;">🎵 許個願望，吹熄蠟燭吧 🎵</p>
        <div class="cake-wrapper">
            <div class="cake" id="cakeClickArea">
                <div class="candle">
                    <div class="flame" id="candleFlame"></div>
                </div>
                <div class="cake-bottom"></div>
                <div class="cake-top"></div>
            </div>
        </div>
        <div class="instruction">✨ 輕點「火焰」或整個蛋糕吹熄它 ✨</div>
        <button id="forceBlowBtn" style="background:#ffb347; margin-top: 25px;">💨 吹蠟燭！ 💨</button>
    </section>

    <section id="step4" class="hidden">
        <div class="polaroid" style="transform: rotate(3deg);">
            <img id="lastImg" src="https://i.ibb.co/4RBqhdkK/IMG-8809.jpg" alt="約定見面">
            <div class="polaroid-text">❤️ 愛你愛你愛你 ❤️</div>
        </div>
        <div id="cd" class="timer">計算甜蜜倒數中...</div>
        <p style="margin-top: 12px;">💌 我最愛的寶貝，生日快樂 💌</p>
        <button id="playMusicAgain" style="background:#6a4e9b; margin-top: 20px;">🎵 重播音樂 🎵</button>
    </section>
</div>

<!-- 背景音樂 - 改用穩定的公開音樂 -->
<audio id="bgMusic" loop preload="auto">
    <source src="https://mp3tourl.com/audio/1777728047005-6cf90b5a-f7a6-4216-bf2a-d581939821cb.mp3" type="audio/mpeg">
</audio>

<script>
    // ========== 星星系統 ==========
    const canvas = document.getElementById('starCanvas');
    let ctx = canvas.getContext('2d');
    let starsArray = [];
    let shootingStars = [];
    let starCount = 250;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
    }
    
    function initStars() {
        starsArray = [];
        for (let i = 0; i < starCount; i++) {
            starsArray.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2.5 + 1,
                alpha: Math.random() * 0.6 + 0.3,
                blinkSpeed: Math.random() * 0.03 + 0.01
            });
        }
    }
    
    function drawStars() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#03051a');
        grad.addColorStop(1, '#0b102f');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        for (let s of starsArray) {
            let alphaVal = s.alpha + Math.sin(Date.now() * s.blinkSpeed) * 0.2;
            alphaVal = Math.min(0.95, Math.max(0.25, alphaVal));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 240, 200, ${alphaVal})`;
            ctx.fill();
        }
        
        // 流星
        for (let i = 0; i < shootingStars.length; i++) {
            const star = shootingStars[i];
            ctx.beginPath();
            ctx.moveTo(star.x, star.y);
            ctx.lineTo(star.x + star.speedX * 1.5, star.y + star.speedY * 1.5);
            ctx.lineWidth = 2;
            ctx.strokeStyle = `rgba(255, 220, 150, ${star.alpha})`;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(star.x, star.y, 2, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 200, 100, ${star.alpha})`;
            ctx.fill();
            
            star.x += star.speedX;
            star.y += star.speedY;
            star.alpha -= 0.015;
            if (star.x + 50 < 0 || star.x - 50 > canvas.width || star.y > canvas.height + 30 || star.alpha <= 0) {
                shootingStars.splice(i,1);
                i--;
            }
        }
    }
    
    function addShootingStar() {
        if (Math.random() < 0.1) {
            shootingStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.3,
                speedX: -5 - Math.random() * 8,
                speedY: 2 + Math.random() * 5,
                alpha: 0.8
            });
        }
        if (shootingStars.length > 10) shootingStars.shift();
    }
    
    function animateStars() {
        drawStars();
        addShootingStar();
        requestAnimationFrame(animateStars);
    }
    
    window.addEventListener('resize', () => resizeCanvas());
    
    // ========== 頁面邏輯 ==========
    let photoInterval = null;
    let audio = document.getElementById('bgMusic');
    let musicPlayAttempted = false;
    let countdownInterval = null;
    let blown = false;
    
    // ✅ 修正：照片陣列 - 只放純圖片網址！
    const photosArray = [
        "https://i.ibb.co/4RBqhdkK/IMG-8809.jpg",   // 您自己的照片
        "https://i.ibb.co/HDVqTJ50/IMG-8685.jpg",      // 備用可愛圖
        "https://i.ibb.co/CKhCzB1S/C8EA2504-C469-42B5-ACB3-4948693E7AAA.jpg",      // 備用
        "https://i.ibb.co/yBqLF6sd/IMG-9091.jpg"       // 備用
    ];
    const lastPhoto = "https://i.ibb.co/4RBqhdkK/IMG-8809.jpg";
    
    function playBackgroundMusic() {
        if (audio) {
            audio.volume = 0.4;
            audio.play().catch(e => console.log("需要用戶互動"));
        }
    }
    
    function toStep2() {
        if (!musicPlayAttempted) {
            playBackgroundMusic();
            musicPlayAttempted = true;
        }
        
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        
        let picIndex = 0;
        const picElement = document.getElementById('pic');
        if (photoInterval) clearInterval(photoInterval);
        picElement.src = photosArray[0];
        photoInterval = setInterval(() => {
            picIndex = (picIndex + 1) % photosArray.length;
            picElement.src = photosArray[picIndex];
        }, 2800);
    }
    
    function toStep3() {
        if (photoInterval) clearInterval(photoInterval);
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        
        blown = false;
        const flame = document.getElementById('candleFlame');
        if (flame) {
            flame.classList.remove('flame-out');
            flame.style.animation = 'flicker 0.18s infinite alternate';
            flame.style.opacity = '1';
        }
    }
    
    function blowCandle() {
        if (blown) return;
        const flame = document.getElementById('candleFlame');
        if (!flame) return;
        
        flame.classList.add('flame-out');
        flame.style.animation = 'none';
        blown = true;
        
        setTimeout(() => {
            toStep4();
        }, 350);
    }
    
    function toStep4() {
        if (countdownInterval) clearInterval(countdownInterval);
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('step4').classList.remove('hidden');
        
        const lastImgElem = document.getElementById('lastImg');
        if (lastImgElem) lastImgElem.src = lastPhoto;
        
        const targetDate = new Date("July 9, 2026 00:00:00").getTime();
        
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) {
                document.getElementById('cd').innerHTML = "🎉 就是今天！寶貝見面啦 🎉";
                if (countdownInterval) clearInterval(countdownInterval);
                return;
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % 86400000) / 3600000);
            const minutes = Math.floor((distance % 3600000) / 60000);
            const seconds = Math.floor((distance % 60000) / 1000);
            document.getElementById('cd').innerHTML = `📅 距離7月9日見面還有 ${days}天 ${hours}時 ${minutes}分 ${seconds}秒 💖`;
        }
        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 1000);
        
        if (audio && audio.paused) {
            audio.play().catch(e => {});
        }
    }
    
    function bindExtraButtons() {
        const replayBtn = document.getElementById('playMusicAgain');
        if (replayBtn) {
            replayBtn.addEventListener('click', () => {
                if (audio) {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log);
                }
            });
        }
        
        const forceBtn = document.getElementById('forceBlowBtn');
        if (forceBtn) {
            forceBtn.addEventListener('click', () => blowCandle());
        }
        
        const cakeArea = document.getElementById('cakeClickArea');
        if (cakeArea) {
            cakeArea.addEventListener('click', () => {
                if (!blown) blowCandle();
            });
        }
        
        const flameOnly = document.getElementById('candleFlame');
        if (flameOnly) {
            flameOnly.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!blown) blowCandle();
            });
        }
    }
    
    window.onload = () => {
        resizeCanvas();
        animateStars();
        bindExtraButtons();
    };
    
    window.toStep2 = toStep2;
    window.toStep3 = toStep3;
    window.blowCandle = blowCandle;
    
    window.addEventListener('beforeunload', () => {
        if (photoInterval) clearInterval(photoInterval);
        if (countdownInterval) clearInterval(countdownInterval);
    });
</script>
</body>
</html>
