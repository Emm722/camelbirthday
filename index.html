<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b0d17; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        /* 動態純 CSS 星空 - 絕不卡住 */
        .stars-bg { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: blink 2s infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: white; }
        
        /* 浪漫毛玻璃卡片 */
        .glass-box { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%; max-width: 320px;
        }

        /* 拍立得照片 */
        .photo-frame { 
            background: white; padding: 10px 10px 40px 10px; margin-bottom: 20px;
            transform: rotate(-2deg); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .photo-frame img { width: 100%; height: 250px; object-fit: cover; background: #eee; }

        /* CSS 3D 蛋糕 */
        .cake { position: relative; width: 120px; height: 80px; background: #ff9aaf; margin: 40px auto; border-radius: 10px; cursor: pointer; }
        .cake::before { content: ''; position: absolute; top: 20px; left: -5px; width: 130px; height: 15px; background: #fff; border-radius: 10px; opacity: 0.8; }
        .candle { position: absolute; top: -35px; left: 55px; width: 10px; height: 35px; background: #eee; border-radius: 5px; }
        .fire { position: absolute; top: -15px; left: -2px; width: 14px; height: 20px; background: #ff4500; border-radius: 50%; box-shadow: 0 0 15px #ff4500; animation: shake 0.2s infinite; }
        @keyframes shake { from { transform: scale(1); } to { transform: scale(1.1); } }

        button { 
            background: #ff7b9c; color: white; border: none; padding: 12px 30px; 
            border-radius: 25px; font-size: 1rem; cursor: pointer; transition: 0.3s;
        }
        .hidden { display: none !important; }
        .countdown { color: #ffeb3b; font-size: 1.1rem; margin-top: 15px; }
    </style>
</head>
<body>

<div class="stars-bg" id="starField"></div>

<!-- 音樂 - 為了穩定的預防性處理 -->
<audio id="bgm" loop><source src="你的音樂網址" type="audio/mpeg"></audio>

<div id="app">
    <div id="step1" class="glass-box">
        <h2 style="letter-spacing: 2px;">Happy Birthday</h2>
        <p>這是我為你準備的小驚喜</p>
        <button onclick="toStep2()">進入我們的星空</button>
    </div>

    <div id="step2" class="hidden">
        <div class="photo-frame">
            <img id="imgSrc" src="你的照片1">
        </div>
        <button onclick="toStep3()">許下心願</button>
    </div>

    <div id="step3" class="hidden glass-box">
        <p>點擊火苗吹熄它</p>
        <div class="cake" onclick="toStep4()">
            <div class="candle"><div class="fire" id="fire"></div></div>
        </div>
    </div>

    <div id="step4" class="hidden">
        <div class="photo-frame" style="transform: rotate(2deg);">
            <img src="你的照片2">
        </div>
        <div class="glass-box">
            <p>生日快樂，我的寶貝 ❤️</p>
            <div class="countdown" id="timer"></div>
            <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 10px;">7/9 見面那天，我要親口說</p>
        </div>
    </div>
</div>

<script>
    // 1. 手動生成星星 (絕對不會壞)
    const field = document.getElementById('starField');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.width = s.style.height = Math.random() * 3 + 'px';
        s.style.top = Math.random() * 100 + '%';
        s.style.left = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 2 + 's';
        field.appendChild(s);
    }

    // 2. 邏輯控制
    const music = document.getElementById('bgm');
    const pics = ["你的照片1", "你的照片2"]; 

    function toStep2() {
        // 嘗試播放音樂，失敗也沒關係
        try { music.play(); } catch(e) {}
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        // 照片輪播
        let idx = 0;
        setInterval(() => {
            idx = (idx + 1) % pics.length;
            document.getElementById('imgSrc').src = pics[idx];
        }, 3000);
    }

    function toStep3() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
    }

    function toStep4() {
        document.getElementById('fire').classList.add('hidden');
        setTimeout(() => {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            startTimer();
        }, 800);
    }

    function startTimer() {
        const target = new Date("July 9, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = target - now;
            const days = Math.floor(d / (1000 * 60 * 60 * 24));
            const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((d % (1000 * 60)) / 1000);
            document.getElementById('timer').innerText = `倒數見面：${days}天 ${hours}時 ${mins}分 ${secs}秒`;
        }, 1000);
    }
</script>
</body>
</html>
