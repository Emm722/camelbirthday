<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <style>
        :root { --main-pink: #ff9a9e; --dark-bg: #0b0d17; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--dark-bg); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* 動態星空 */
        .stars-container { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at bottom, #1b2735 0%, #090a0f 100%); z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        #app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: white; transition: opacity 1s; }
        .fade-in { animation: fadeIn 1.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 拍立得高級感 */
        .polaroid { background: white; padding: 15px 15px 50px 15px; border-radius: 2px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); width: 280px; transform: rotate(-2deg); margin: 20px auto; transition: 0.5s; }
        .polaroid img { width: 100%; height: 280px; object-fit: cover; display: block; filter: contrast(1.05) brightness(1.02); }
        .polaroid-text { color: #444; margin-top: 15px; font-style: italic; font-size: 1.1rem; }

        /* 精緻蛋糕 */
        .cake-wrap { position: relative; width: 200px; height: 150px; margin: 40px auto; cursor: pointer; }
        .cake-layer { position: absolute; width: 160px; height: 60px; background: #fff5f5; border-radius: 10px; left: 20px; bottom: 0; box-shadow: 0 4px #f0d4d4; }
        .cake-layer::after { content: ''; position: absolute; width: 100%; height: 20px; background: #ffb7c5; top: 15px; border-radius: 5px; }
        .icing { position: absolute; width: 170px; height: 30px; background: #ff7b9c; border-radius: 20px; top: 65px; left: 15px; box-shadow: 0 4px #e66a8a; }
        .candle-stick { position: absolute; width: 12px; height: 45px; background: #fff; left: 94px; top: 25px; border-radius: 3px; border-bottom: 4px solid #ff7b9c; }
        .candle-fire { position: absolute; width: 16px; height: 26px; background: #ff4500; border-radius: 50% 50% 20% 20%; top: -22px; left: -2px; box-shadow: 0 0 20px #ff4500, 0 0 40px rgba(255,69,0,0.6); animation: flameMove 0.5s infinite alternate; }
        @keyframes flameMove { from { transform: scale(1) rotate(-1deg); opacity: 0.8; } to { transform: scale(1.15) rotate(1deg); opacity: 1; } }

        /* 文字與按鈕 */
        h1 { font-weight: 200; letter-spacing: 5px; margin-bottom: 20px; }
        .timer-text { font-size: 1.2rem; color: #ffeb3b; text-shadow: 0 0 10px rgba(255,235,59,0.5); }
        button { padding: 15px 40px; background: transparent; border: 1px solid white; color: white; border-radius: 30px; cursor: pointer; font-size: 1rem; transition: 0.4s; letter-spacing: 2px; }
        button:hover { background: white; color: black; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="stars-container" id="stars"></div>

<!-- 音樂元件 -->
<audio id="audio" loop>
    <source src="https://vps-2832b6fa.ytconvert.org/files/8R9AWJXsKHvkVrniH9mIt/output.mp3?token=43c25288d731ccb876a1aa7cf56290bdcf0719fbac6fb4028889d922dc47b469&expires=1777722467" type="audio/mpeg">
</audio>

<div id="app" class="fade-in">
    <!-- 第一步 -->
    <div id="s1">
        <h1>Happy Birthday</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">這是一份跨越距離的禮物</p>
        <button onclick="go2()">點擊進入</button>
    </div>

    <!-- 第二步 -->
    <div id="s2" class="hidden">
        <div class="polaroid">
            <img id="slideshow" src="你的照片1">
            <div class="polaroid-text">相遇，是最好的安排 ❤️</div>
        </div>
        <button onclick="go3()">看看驚喜</button>
    </div>

    <!-- 第三步 -->
    <div id="s3" class="hidden">
        <p style="margin-bottom: 30px;">閉上眼許願，然後吹熄它...</p>
        <div class="cake-wrap" onclick="go4()">
            <div class="candle-stick"><div class="candle-fire" id="fire"></div></div>
            <div class="cake-layer"></div>
            <div class="icing"></div>
        </div>
    </div>

    <!-- 第四步 -->
    <div id="s4" class="hidden">
        <div class="polaroid" style="transform: rotate(3deg);">
            <img src="你的照片2">
            <div class="polaroid-text">下次見面，親口對你說</div>
        </div>
        <div class="timer-text" id="cd"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    // 生成隨機星星
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 'px';
        star.style.width = size;
        star.style.height = size;
        star.style.top = Math.random() * 100 + '%';
        star.style.left = Math.random() * 100 + '%';
        star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
        starsContainer.appendChild(star);
    }

    const music = document.getElementById('audio');
    const photos = ["你的照片1", "你的照片2"]; // 記得換成你的真實連結

    function switchStep(oldId, newId) {
        const app = document.getElementById('app');
        app.style.opacity = '0';
        setTimeout(() => {
            document.getElementById(oldId).classList.add('hidden');
            document.getElementById(newId).classList.remove('hidden');
            app.style.opacity = '1';
        }, 800);
    }

    function go2() {
        music.play().catch(e => console.log("音樂播放受限"));
        switchStep('s1', 's2');
        let i = 0;
        setInterval(() => {
            i = (i + 1) % photos.length;
            document.getElementById('slideshow').src = photos[i];
        }, 3000);
    }

    function go3() { switchStep('s2', 's3'); }

    function go4() {
        document.getElementById('fire').style.display = 'none';
        confetti({ particleCount: 200, spread: 90, origin: { y: 0.7 } });
        setTimeout(() => {
            switchStep('s3', 's4');
            startCD();
        }, 1200);
    }

    function startCD() {
        const target = new Date("July 9, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = target - now;
            const days = Math.floor(d / (1000 * 60 * 60 * 24));
            const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((d % (1000 * 60)) / 1000);
            document.getElementById('cd').innerHTML = `距離見面還有：${days}天 ${hours}時 ${mins}分 ${secs}秒`;
        }, 1000);
    }
</script>
</body>
</html>
