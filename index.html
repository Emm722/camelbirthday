<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快樂 ❤️</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #020205; font-family: sans-serif; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #020205 url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat; opacity: 0.5; }
        #app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: white; padding: 20px; box-sizing: border-box; }

        /* 拍立得相框 */
        .polaroid { background: white; padding: 10px 10px 40px 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: rotate(-2deg); margin: 20px auto; width: 260px; }
        .polaroid img { width: 100%; height: 260px; object-fit: cover; display: block; background: #eee; }
        .polaroid-text { color: #333; margin-top: 10px; font-size: 1rem; }

        /* CSS 蛋糕 */
        .cake-container { position: relative; width: 160px; height: 160px; margin: 40px auto; cursor: pointer; }
        .cake-body { position: absolute; bottom: 0; width: 140px; height: 70px; background: #f4e1d2; border-radius: 10px 10px 0 0; left: 10px; box-shadow: inset 0 -10px #eecdb3; }
        .cake-icing { position: absolute; top: -5px; width: 140px; height: 25px; background: #ff7b9c; border-radius: 20px; }
        .candle { position: absolute; top: -40px; left: 74px; width: 10px; height: 40px; background: #fff; border-radius: 2px; }
        .flame { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 12px; height: 20px; background: #ff4500; border-radius: 50% 50% 20% 20%; box-shadow: 0 0 15px #ff4500; animation: flicker 0.6s infinite alternate; }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(1.2); } }

        .timer { font-size: 1.2rem; color: #ffeb3b; margin-top: 15px; font-weight: bold; }
        button { padding: 15px 40px; background: #ff7b9c; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 1.1rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="stars"></div>

<!-- 音樂 -->
<audio id="bgMusic" loop>
    <source src="你的音樂網址" type="audio/mpeg">
</audio>

<div id="app">
    <!-- 步驟 1 -->
    <div id="step1">
        <h1>Hi 寶貝 ❤️</h1>
        <p>今天是你的大日子</p>
        <button onclick="goStep2()">開啟驚喜</button>
    </div>

    <!-- 步驟 2 -->
    <div id="step2" class="hidden">
        <div class="polaroid">
            <img id="slideshow" src="你的照片1">
            <div class="polaroid-text">Happy Birthday!</div>
        </div>
        <button onclick="goStep3()">這是送給你的蛋糕</button>
    </div>

    <!-- 步驟 3 -->
    <div id="step3" class="hidden">
        <p>許完願後，點擊火苗吹熄它</p>
        <div class="cake-container" onclick="goStep4()">
            <div class="candle"><div class="flame" id="f"></div></div>
            <div class="cake-body"><div class="cake-icing"></div></div>
        </div>
    </div>

    <!-- 步驟 4 -->
    <div id="step4" class="hidden">
        <div class="polaroid" style="transform: rotate(2deg);">
            <img src="你的照片2">
            <div class="polaroid-text">7月9日，等我見你</div>
        </div>
        <div id="timeText" class="timer">載入中...</div>
    </div>
</div>

<script>
    // 防止程式報錯導致卡死的機制
    window.onerror = function() { return true; };

    const music = document.getElementById('bgMusic');
    // 請務必確保這裡的網址是正確的，或先用佔位圖測試
    const photos = ["你的照片1", "你的照片2"]; 
    
    function goStep2() {
        // 嘗試播放音樂，就算失敗也繼續往下跑
        try { music.play(); } catch(e) {}
        
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        
        let idx = 0;
        setInterval(() => {
            idx = (idx + 1) % photos.length;
            document.getElementById('slideshow').src = photos[idx];
        }, 3000);
    }

    function goStep3() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
    }

    function goStep4() {
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('step4').classList.remove('hidden');
        
        // 倒數計時邏輯
        const target = new Date("July 9, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = target - now;
            const days = Math.floor(d / (1000 * 60 * 60 * 24));
            const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((d % (1000 * 60)) / 1000);
            document.getElementById('timeText').innerText = 
                "距離見面還有：" + days + "天 " + hours + "時 " + mins + "分 " + secs + "秒";
        }, 1000);
    }
</script>
</body>
</html>
